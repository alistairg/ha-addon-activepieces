map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen %%INGRESS_PORT%%;

    allow 172.30.32.2;
    deny all;

    client_max_body_size 512m;

    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Robots-Tag none;

    root /usr/share/nginx/html;
    index index.html;

    # Use X-Ingress-Path header from HA for path rewriting
    set $ingress_path $http_x_ingress_path;

    # Rewrite absolute paths in HTML responses for ingress compatibility
    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter '<base href="/">' '<base href="$ingress_path/">';
    sub_filter 'src="/' 'src="$ingress_path/';
    sub_filter 'href="/' 'href="$ingress_path/';
    # Inject script to intercept fetch/XHR and rewrite absolute paths through ingress
    sub_filter '</head>' '<script>(function(){var b="$ingress_path";if(!b)return;var o=window.location.origin;function r(u){if(typeof u!=="string")return u;if(u.startsWith("/"))return b+u;if(u.startsWith(o+"/")&&!u.startsWith(o+b))return o+b+u.slice(o.length);return u}var f=window.fetch;window.fetch=function(u,opts){return f.call(this,r(u),opts)};var x=XMLHttpRequest.prototype.open;XMLHttpRequest.prototype.open=function(){arguments[1]=r(arguments[1]);return x.apply(this,arguments)}})();</script></head>';

    # API requests - trailing slash strips /api/ prefix before proxying
    location /api/ {
        proxy_pass http://127.0.0.1:3000/;

        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    # WebSocket (socket.io) requests
    location /socket.io {
        proxy_pass http://127.0.0.1:3000/socket.io;

        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    # Frontend - serve static files, fallback to index.html for SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
